apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentic-rag
  template:
    metadata:
      labels:
        app: agentic-rag
    spec:
      containers:
        - name: api
          image: ghcr.io/krishna89287/enterprise-agentic-rag-azure:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: agentic-rag-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
